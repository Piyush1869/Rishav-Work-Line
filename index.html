<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen active">
        <h1>Lab Workflow Manager</h1>
        
        <div class="login-box">
            <button id="login-google-btn">Login with Gmail</button>
            <hr style="margin: 20px 0;">
            
            <h3>Or Login with Phone</h3>
            <input type="tel" id="phone-number" placeholder="+919876543210" style="margin-bottom: 10px;">
            <div id="recaptcha-container"></div>
            <button id="send-otp-btn">Send OTP</button>

            <div id="otp-section" style="display: none; margin-top: 15px;">
                <input type="text" id="otp-code" placeholder="Enter 6-digit OTP">
                <button id="verify-otp-btn">Verify OTP</button>
            </div>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <h2>Complete Your Profile</h2>
        <p id="profile-instruction">Please fill in your missing details.</p>
        
        <input type="text" id="prof-name" placeholder="Full Name">
        
        <input type="email" id="prof-email" placeholder="Gmail Address" style="display: none;">
        <input type="tel" id="prof-phone" placeholder="Phone Number (+91...)" style="display: none;">
        
        <select id="prof-lab">
            <option value="PVL">PVL Lab</option>
            <option value="HET">HET Lab</option>
            <option value="Both">Both Labs</option>
        </select>
        <button id="save-profile-btn">Save Profile</button>
    </div>

    <div id="dashboard-screen" class="screen">
        <header>
            <div class="user-info">
                <span id="display-name">User</span> | <span id="display-lab">Lab</span>
            </div>
            <div class="status-toggle">
                <select id="user-status">
                    <option value="Active">🟢 Active</option>
                    <option value="Leave">🔴 Leave</option>
                </select>
            </div>
        </header>
        <button id="fab-add-task">+</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
