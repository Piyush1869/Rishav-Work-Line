<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lab Task Manager</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div id="flash-overlay" class="flash-overlay"></div>
    <audio id="task-alarm" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <nav class="top-nav">
        <div class="nav-brand"><i class="fas fa-microscope"></i> LabManager</div>
        <div class="nav-actions">
            <button id="install-app-btn" style="display: none; background: #10b981; color: white;" class="btn"><i class="fas fa-download"></i> Install</button>
            <button id="enable-alerts-btn" class="icon-btn" title="Enable Alerts"><i class="fas fa-bell"></i></button>
            <button id="debug-btn" class="icon-btn" title="Open Console"><i class="fas fa-bug"></i></button>
        </div>
    </nav>

    <div id="login-screen" class="screen active">
        <div class="card login-card">
            <h2>Welcome Back</h2>
            <button id="login-google-btn" class="btn primary-btn"><i class="fab fa-google"></i> Login with Google</button>
            <div class="divider"><span>OR</span></div>
            <input type="tel" id="phone-number" placeholder="+91 98765 43210" class="input-field">
            <div id="recaptcha-container" style="margin-top: 10px;"></div>
            <button id="send-otp-btn" class="btn secondary-btn" style="width: 100%; margin-top: 10px;"><i class="fas fa-sms"></i> Send OTP</button>
            <div id="otp-section" style="display: none; margin-top: 15px;">
                <input type="text" id="otp-code" placeholder="Enter 6-digit OTP" class="input-field">
                <button id="verify-otp-btn" class="btn primary-btn" style="width: 100%; margin-top: 10px;">Verify OTP</button>
            </div>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="card">
            <h2>Your Profile</h2>
            <input type="text" id="prof-name" placeholder="Full Name" class="input-field">
            <input type="email" id="prof-email" placeholder="Gmail Address" class="input-field">
            <input type="tel" id="prof-phone" placeholder="Phone Number (+91...)" class="input-field">
            <select id="prof-lab" class="input-field">
                <option value="PVL">PVL Lab</option>
                <option value="HET">HET Lab</option>
                <option value="Both">Both Labs</option>
            </select>
            <button id="save-profile-btn" class="btn primary-btn" style="width: 100%; margin-top: 15px;">Save Profile</button>
        </div>
    </div>

    <div id="dashboard-screen" class="screen">
        <header class="dashboard-header card">
            <div class="user-profile">
                <img id="display-pic" src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff" alt="Profile" class="profile-pic" onerror="this.src='https://ui-avatars.com/api/?name=U&background=2563eb&color=fff'">
                <div class="user-details">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <h3 id="display-name" style="margin:0; font-size: 1.1rem;">Loading...</h3>
                        <button id="edit-profile-btn" class="icon-btn" style="padding: 2px 6px; font-size: 0.8rem;" title="Edit Profile"><i class="fas fa-pencil-alt"></i></button>
                    </div>
                    <span id="display-email" style="display:block; font-size: 0.8rem; color: var(--text-muted);"></span>
                    <span id="display-lab" class="badge">Lab</span>
                </div>
            </div>
            <select id="user-status" class="status-select">
                <option value="Active">🟢 Active</option>
                <option value="Leave">🔴 On Leave</option>
            </select>
        </header>

        <div class="stats-container card">
            <div class="stat-box"><h4 id="stat-assigned">0</h4><p>Created</p></div>
            <div class="stat-box"><h4 id="stat-helped" style="color: #10b981;">0</h4><p>Taken by Others</p></div>
            <div class="stat-box"><h4 id="stat-accepted" style="color: #f59e0b;">0</h4><p>My Accepted</p></div>
        </div>

        <div class="dashboard-grid">
            <div class="task-column card" style="border-top: 4px solid #f59e0b;">
                <h3><i class="fas fa-exclamation-circle" style="color:#f59e0b;"></i> Pending Tasks</h3>
                <div id="open-tasks-list" class="task-list"><p class="text-muted">No pending tasks.</p></div>
            </div>
            <div class="task-column card" style="border-top: 4px solid #10b981;">
                <h3><i class="fas fa-check-circle" style="color:#10b981;"></i> My Tasks</h3>
                <div id="my-tasks-list" class="task-list"><p class="text-muted">No accepted tasks.</p></div>
            </div>
        </div>

        <button id="fab-chat" class="fab" style="bottom: 95px; background: #10b981;"><i class="fas fa-comments"></i></button>
        <button id="fab-add-task" class="fab"><i class="fas fa-plus"></i></button>
    </div>

    <div id="chat-panel" class="chat-panel hidden">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap: 10px;">
                <button id="chat-back-btn" class="icon-btn hidden" style="color:white;"><i class="fas fa-arrow-left"></i></button>
                <h3 id="chat-panel-title" style="margin:0;"><i class="fas fa-address-book"></i> Contacts</h3>
            </div>
            <button id="close-chat-btn" class="icon-btn" style="color:white;"><i class="fas fa-times"></i></button>
        </div>
        <div id="chat-contact-list" class="chat-messages"></div>
        <div id="chat-conversation-area" class="hidden" style="display: flex; flex-direction: column; flex: 1; height: 100%;">
            <div id="chat-messages" class="chat-messages" style="flex:1;"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." class="input-field" style="margin:0; flex:1;">
                <button id="send-chat-btn" class="btn primary-btn" style="width: 50px; padding: 10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="task-modal" class="modal">
        <div class="modal-content card">
            <h3>Create New Task</h3>
            <input type="text" id="task-title" placeholder="Task Title" class="input-field">
            <textarea id="task-details" placeholder="Details & Location" class="input-field" rows="3"></textarea>
            <input type="text" id="task-time" placeholder="Time Needed (e.g., 2 hours)" class="input-field">
            <input type="text" id="task-manager" placeholder="Manager Name" class="input-field">
            
            <label class="input-label">Target Lab:</label>
            <select id="task-target-lab" class="input-field">
                <option value="PVL">PVL Only</option>
                <option value="HET">HET Only</option>
                <option value="Both">Both</option>
            </select>

            <label class="input-label">Alert Method:</label>
            <select id="task-assignee" class="input-field">
                <option value="All">App Flash Only</option>
                <option value="WhatsApp">WhatsApp Forward Only</option>
                <option value="BothAlerts">🔥 App Flash + WhatsApp</option>
            </select>

            <div class="modal-actions">
                <button id="close-modal-btn" class="btn secondary-btn">Cancel</button>
                <button id="submit-task-btn" class="btn primary-btn">Publish</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <div id="debug-modal" class="modal">
        <div class="modal-content card" style="background: #000; color: #0f0; border: 1px solid #333;">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <h3 style="margin:0;"><i class="fas fa-terminal"></i> Console</h3>
                <button id="close-debug-btn" class="icon-btn" style="color: #fff;"><i class="fas fa-times"></i></button>
            </div>
            <div id="debug-log" style="height: 300px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; word-wrap: break-word;"></div>
            <button id="clear-debug-btn" class="btn secondary-btn" style="width: 100%; margin-top: 10px; background: #333; color: white;">Clear Log</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
